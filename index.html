<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pedidos de Atención — Producción a Mantenimiento — Akapol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#f0ede8;--card:#fff;--tx:#1c1a17;--mu:#7a7570;--br:#dedad4;
  --ac:#c45c1a;--ac2:#e8956d;--head:#1c1a17;--gn:#2e7d32;--gn2:#d4edda;
  --yl:#f59e0b;--yl2:#fff3cd;--rd:#c0392b;--rd2:#fdecea;--in-bg:#fffde7;--in-br:#e9d98a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;padding-bottom:40px;}

.hdr{background:var(--head);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.hdr-left .ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ac2);font-family:'Space Mono',monospace;margin-bottom:3px;}
.hdr-left h1{font-size:19px;font-weight:800;}
.estado-conexion{font-size:11px;color:#bbb;}

.wrap{max-width:760px;margin:0 auto;padding:18px 16px 0;}

.card{background:var(--card);border:1px solid var(--br);border-radius:14px;padding:18px;margin-bottom:16px;}
.card h2{font-size:14px;font-weight:800;margin-bottom:12px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid .full{grid-column:1/-1;}
@media(max-width:500px){.grid{grid-template-columns:1fr;}}

.f label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--mu);margin-bottom:5px;}
.f input,.f select,.f textarea{
  width:100%;padding:10px 11px;border:1px solid var(--in-br);background:var(--in-bg);
  border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:var(--tx);
}
.f textarea{resize:vertical;min-height:56px;}
.f input:focus,.f select:focus,.f textarea:focus{outline:2px solid var(--ac);outline-offset:1px;}

.urg-btns{display:flex;gap:8px;}
.urg-btn{flex:1;padding:10px 8px;border-radius:8px;border:1.5px solid var(--br);background:#fff;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--mu);}
.urg-btn.on-normal{border-color:var(--gn);color:var(--gn);background:var(--gn2);}
.urg-btn.on-urgente{border-color:var(--rd);color:var(--rd);background:var(--rd2);}

.btn{padding:11px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.btn-ac{background:var(--ac);color:#fff;width:100%;margin-top:14px;}
.btn-ac:disabled{opacity:.4;}
.btn-gh{background:#fff;border:1px solid var(--br);color:var(--tx);}
.btn-sm{padding:7px 14px;font-size:11.5px;}

.status{font-size:12px;margin-top:8px;}
.status.ok{color:var(--gn);font-weight:700;}
.status.err{color:var(--rd);font-weight:700;}

.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.filtro-btns{display:flex;gap:6px;}
.filtro-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--br);background:#fff;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--mu);}
.filtro-btn.on{background:var(--ac);border-color:var(--ac);color:#fff;}

.fecha-titulo{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mu);margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--br);}
.fecha-titulo:first-child{margin-top:0;}

.pedido-card{border:1.5px solid var(--br);border-radius:10px;padding:12px 14px;margin-bottom:9px;}
.pedido-card.pendiente{border-left:4px solid var(--yl);}
.pedido-card.atendido{border-left:4px solid var(--gn);opacity:.85;}
.pedido-card.urgente-pend{border-left:4px solid var(--rd);background:var(--rd2);}
.ped-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ped-hora{font-family:'Space Mono',monospace;font-weight:700;color:var(--ac);font-size:13px;}
.ped-equipo{font-weight:800;font-size:14px;margin-top:2px;}
.ped-problema{font-size:13px;color:var(--tx);margin-top:3px;}
.ped-meta{font-size:11px;color:var(--mu);margin-top:5px;}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.chip-urgente{background:var(--rd2);color:var(--rd);}
.chip-normal{background:#eee;color:var(--mu);}
.chip-pend{background:var(--yl2);color:#8a6100;}
.chip-atend{background:var(--gn2);color:var(--gn);}
.nota-atendido{font-size:12px;color:var(--gn);margin-top:6px;background:var(--gn2);border-radius:8px;padding:6px 10px;}
.atender-form{margin-top:10px;display:none;}
.atender-form.on{display:block;}
.atender-form textarea{width:100%;border:1px solid var(--br);border-radius:8px;padding:8px;font-size:12.5px;font-family:'Inter',sans-serif;margin-bottom:8px;}

.vacio{text-align:center;color:var(--mu);padding:30px 10px;font-size:13px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="ey">Akapol · Mantenimiento</div>
    <h1>Pedidos de Atención — Producción</h1>
  </div>
  <div class="estado-conexion" id="estadoConexion"></div>
</div>

<div class="wrap">

  <div class="card">
    <h2>Registrar nueva llamada</h2>
    <div class="grid">
      <div class="f">
        <label>Turno / Quién registra</label>
        <select id="turno">
          <option value="">—</option>
          <option value="Matías">Matías</option>
          <option value="Luciano">Luciano</option>
        </select>
      </div>
      <div class="f">
        <label>Hora</label>
        <input type="time" id="hora">
      </div>
      <div class="f full">
        <label>¿Quién llamó?</label>
        <input type="text" id="quienLlamo" placeholder="Nombre de quien reporta">
      </div>
      <div class="f full">
        <label>Equipo / Línea</label>
        <input type="text" id="equipo" placeholder="Ej: IWK 6, Ensambladora 2, Romaco...">
      </div>
      <div class="f full">
        <label>Problema</label>
        <textarea id="problema" placeholder="Descripción corta del problema..."></textarea>
      </div>
      <div class="f full">
        <label>Urgencia</label>
        <div class="urg-btns">
          <button type="button" class="urg-btn" id="btnUrgNormal" onclick="setUrgencia('Normal')">Normal</button>
          <button type="button" class="urg-btn" id="btnUrgUrgente" onclick="setUrgencia('Urgente')">⚠️ Urgente</button>
        </div>
      </div>
    </div>
    <button class="btn btn-ac" id="btnRegistrar" onclick="registrarPedido()" disabled>Registrar llamada</button>
    <div class="status" id="statusRegistro"></div>
  </div>

  <div class="card">
    <div class="top-row">
      <h2 style="margin:0">Registro del día</h2>
      <button class="btn btn-gh btn-sm" onclick="actualizarTodo()">🔄 Actualizar</button>
    </div>
    <div class="filtro-btns" style="margin-bottom:12px">
      <button class="filtro-btn on" data-f="todos" onclick="setFiltro('todos')">Todos</button>
      <button class="filtro-btn" data-f="pendientes" onclick="setFiltro('pendientes')">Pendientes</button>
      <button class="filtro-btn" data-f="atendidos" onclick="setFiltro('atendidos')">Atendidos</button>
    </div>
    <div id="listaPedidos"></div>
  </div>

</div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSI1HpA68K5muEfz8LrvTKrpexOlMLYJbKh9pbCD4zz1mpugXLh079QY5TdF8NFV0t/exec';
var PEDIDOS = [];
var urgenciaSel = '';
var filtroActual = 'todos';

function esc(s){ return (s||'').toString().replace(/[&<>"]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function hoyISO(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function horaAhoraHHMM(){
  var d=new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fmtDate(iso){
  var p = iso.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}
document.getElementById('hora').value = horaAhoraHHMM();

function setUrgencia(u){
  urgenciaSel = u;
  document.getElementById('btnUrgNormal').classList.toggle('on-normal', u==='Normal');
  document.getElementById('btnUrgUrgente').classList.toggle('on-urgente', u==='Urgente');
  checkReady();
}

function checkReady(){
  var ok = document.getElementById('turno').value && document.getElementById('hora').value &&
           document.getElementById('quienLlamo').value.trim() && document.getElementById('equipo').value.trim() &&
           document.getElementById('problema').value.trim() && urgenciaSel;
  document.getElementById('btnRegistrar').disabled = !ok;
}
['turno','hora','quienLlamo','equipo','problema'].forEach(function(id){
  document.getElementById(id).addEventListener('input', checkReady);
  document.getElementById(id).addEventListener('change', checkReady);
});

function registrarPedido(){
  var payload = {
    action: 'nuevo',
    id: 'ped_'+Date.now(),
    fecha: fmtDate(hoyISO()),
    hora: document.getElementById('hora').value,
    turno: document.getElementById('turno').value,
    quienLlamo: document.getElementById('quienLlamo').value.trim(),
    equipo: document.getElementById('equipo').value.trim(),
    problema: document.getElementById('problema').value.trim(),
    urgencia: urgenciaSel
  };
  document.getElementById('btnRegistrar').disabled = true;
  document.getElementById('btnRegistrar').textContent = 'Guardando...';

  fetch(APPS_SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload)})
    .then(function(){
      document.getElementById('statusRegistro').textContent = '✅ Llamada registrada.';
      document.getElementById('statusRegistro').className = 'status ok';
      limpiarFormulario();
      setTimeout(actualizarTodo, 800);
    })
    .catch(function(err){
      document.getElementById('statusRegistro').textContent = '⚠️ No se pudo registrar: '+err.message;
      document.getElementById('statusRegistro').className = 'status err';
      document.getElementById('btnRegistrar').disabled = false;
      document.getElementById('btnRegistrar').textContent = 'Registrar llamada';
    });
}

function limpiarFormulario(){
  document.getElementById('quienLlamo').value='';
  document.getElementById('equipo').value='';
  document.getElementById('problema').value='';
  urgenciaSel='';
  document.getElementById('btnUrgNormal').classList.remove('on-normal');
  document.getElementById('btnUrgUrgente').classList.remove('on-urgente');
  document.getElementById('hora').value = horaAhoraHHMM();
  document.getElementById('btnRegistrar').textContent = 'Registrar llamada';
  checkReady();
}

function setFiltro(f){
  filtroActual = f;
  document.querySelectorAll('.filtro-btn').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-f')===f); });
  renderLista();
}

function actualizarTodo(){
  var estado = document.getElementById('estadoConexion');
  estado.textContent = 'Actualizando...';
  fetch(APPS_SCRIPT_URL)
    .then(function(r){ return r.json(); })
    .then(function(data){
      PEDIDOS = data.pedidos || [];
      estado.textContent = '✓ '+PEDIDOS.length+' pedidos cargados';
      renderLista();
    })
    .catch(function(){
      estado.textContent = '⚠ Sin conexión con la planilla';
    });
}

function parseFechaCmp(fecha){
  var p = (fecha||'').split('/');
  if(p.length!==3) return '';
  return p[2]+p[1].padStart(2,'0')+p[0].padStart(2,'0');
}

function renderLista(){
  var lista = document.getElementById('listaPedidos');
  var pedidos = PEDIDOS.slice();
  if(filtroActual==='pendientes') pedidos = pedidos.filter(function(p){return p.estado!=='Atendido';});
  if(filtroActual==='atendidos') pedidos = pedidos.filter(function(p){return p.estado==='Atendido';});

  if(!pedidos.length){
    lista.innerHTML = '<div class="vacio">No hay pedidos para mostrar.</div>';
    return;
  }

  var porFecha = {};
  pedidos.forEach(function(p){ (porFecha[p.fecha]=porFecha[p.fecha]||[]).push(p); });
  var fechasOrdenadas = Object.keys(porFecha).sort(function(a,b){ return parseFechaCmp(a)<parseFechaCmp(b)?1:-1; });

  var html = '';
  fechasOrdenadas.forEach(function(fecha){
    var delDia = porFecha[fecha].slice().sort(function(a,b){ return a.hora<b.hora?1:-1; });
    html += '<div class="fecha-titulo">'+esc(fecha)+'</div>';
    delDia.forEach(function(p){
      var pendiente = p.estado !== 'Atendido';
      var urgente = p.urgencia === 'Urgente';
      var cls = pendiente && urgente ? 'urgente-pend' : (pendiente ? 'pendiente' : 'atendido');
      html += '<div class="pedido-card '+cls+'">'+
        '<div class="ped-top">'+
          '<div>'+
            '<span class="ped-hora">'+esc(p.hora)+'</span>'+
            '<div class="ped-equipo">'+esc(p.equipo)+'</div>'+
            '<div class="ped-problema">'+esc(p.problema)+'</div>'+
            '<div class="ped-meta">📞 '+esc(p.quienLlamo)+' · 🔧 '+esc(p.turno)+'</div>'+
          '</div>'+
          '<div style="text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end">'+
            '<span class="chip '+(urgente?'chip-urgente':'chip-normal')+'">'+(urgente?'Urgente':'Normal')+'</span>'+
            '<span class="chip '+(pendiente?'chip-pend':'chip-atend')+'">'+(pendiente?'Pendiente':'Atendido')+'</span>'+
          '</div>'+
        '</div>'+
        (pendiente
          ? '<button class="btn btn-gh btn-sm" style="margin-top:8px" onclick="toggleAtenderForm(\''+p.id+'\')">✓ Marcar atendido</button>'+
            '<div class="atender-form" id="atenderForm_'+p.id+'">'+
              '<textarea id="notaAtencion_'+p.id+'" placeholder="¿Qué se hizo para resolverlo?"></textarea>'+
              '<button class="btn btn-ac" style="margin-top:0" onclick="confirmarAtencion(\''+p.id+'\')">Confirmar</button>'+
            '</div>'
          : (p.notaResolucion ? '<div class="nota-atendido">✓ '+esc(p.notaResolucion)+'</div>' : ''))+
      '</div>';
    });
  });
  lista.innerHTML = html;
}

function toggleAtenderForm(id){
  var el = document.getElementById('atenderForm_'+id);
  el.classList.toggle('on');
}

function confirmarAtencion(id){
  var nota = document.getElementById('notaAtencion_'+id).value.trim();
  var payload = {
    action: 'atender',
    id: id,
    nota: nota,
    fechaAtencion: fmtDate(hoyISO())+' '+horaAhoraHHMM()
  };
  fetch(APPS_SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload)})
    .then(function(){ setTimeout(actualizarTodo, 800); })
    .catch(function(){ alert('No se pudo marcar como atendido (sin conexión).'); });
}

// ── Inicio ──
checkReady();
actualizarTodo();
setInterval(actualizarTodo, 20000);
</script>
</body>
</html>
